name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # Builds the app and generates the target/ folder contents
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # NEW: Uploads your packaged application artifact
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: train-reservation-app
        path: target/*.war  # Changes to *.jar if your project packages as a JAR
