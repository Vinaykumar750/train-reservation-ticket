name: Build and Deploy to Tomcat

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build WAR
        run: mvn clean package

      - name: Verify WAR File
        run: ls -lh target/

      - name: Deploy to All Tomcat Instances One by One
        env:
          TOMCAT_USER: ${{ secrets.TOMCAT_USER }}
          TOMCAT_PASSWORD: ${{ secrets.TOMCAT_PASSWORD }}
          # Space-separated IP addresses of your 3 EC2 instances
          TOMCAT_HOSTS: ${{ secrets.TOMCAT_HOSTS }}
        run: |
          # Locate the .war file generated inside the target directory
          WAR_FILE=$(find target -name "*.war" | head -n 1)
          echo "WAR file found: $WAR_FILE"
          
          # Loop through each IP in the TOMCAT_HOSTS secret
          for HOST in $TOMCAT_HOSTS; do
            echo "============================================="
            echo "Deploying to Tomcat Instance: $HOST"
            echo "============================================="
            
            curl -v \
              -u "$TOMCAT_USER:$TOMCAT_PASSWORD" \
              --upload-file "$WAR_FILE" \
              "http://$HOST:8080/manager/text/deploy?path=/TrainBook&update=true"
              
            echo "Waiting 5 seconds before deploying to the next instance..."
            sleep 5
          done
