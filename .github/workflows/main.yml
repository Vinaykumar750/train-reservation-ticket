name: CI/CD Pipeline to Build and Deploy code to Tomcat

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set-up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build and Package with Maven
      run: mvn clean package

    - name: Verify WAR file exists
      run: ls -lh target/

    - name: Check the Tomcat Connection
      run: |
        curl --fail -u "${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}" \
        "http://${{ secrets.TOMCAT_HOST }}:8080/manager/text/list"

    - name: Deploy WAR to Tomcat
      run: |
        curl -v -u "${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}" \
        -T target/TainBook-1.0.0-SNAPSHOT.war \
        "http://${{ secrets.TOMCAT_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"
   

